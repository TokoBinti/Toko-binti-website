<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Toko Binti</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f1e8;
      color: #1f3d2b;
      text-align: center;
    }

    .hero {
      padding: 80px 20px;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 10px;
    }

    p {
      font-size: 22px;
    }

    .button {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 30px;
      background: #2f6b45;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
    }

    .box {
      background: white;
      margin: 30px auto;
      padding: 30px;
      max-width: 700px;
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Toko Binti</h1>
    <p>Heel je binnenwereld, straal van buiten.</p>
    <a href="#" class="button">Binnenkort verkrijgbaar</a>
  </div>

  <div class="box">
    <h2>Voor huid, buik en balans</h2>
    <p>Een holistisch wellnessmerk voor vrouwen die van binnenuit willen stralen.</p>
  </div>

  <div class="box">
    <h2>Onze eerste formule</h2>
    <p>Een premium probioticum ontwikkeld met focus op huid, darmgezondheid en vrouwelijke balans.</p>
  </div>

</body>
</html>
